name: Public snapshot checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate repository
        run: python scripts/validate_public_snapshot.py
      - name: Compile Python sources
        run: python -m compileall -q LM NLU scripts

